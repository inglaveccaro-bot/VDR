<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Posizione condivisa – Google Maps</title>
  <link rel="icon" href="https://maps.google.com/favicon.ico">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top bar stile Google Maps */
    .topbar {
      background: #fff;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      z-index: 10;
    }

    .topbar svg {
      flex-shrink: 0;
    }

    .search-box {
      flex: 1;
      background: #f1f3f4;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 15px;
      color: #3c4043;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .search-box span {
      opacity: 0.6;
      font-size: 13px;
    }

    /* Mappa fake */
    .map-container {
      flex: 1;
      position: relative;
      background: #e8ead3;
      overflow: hidden;
      min-height: 300px;
    }

    .map-bg {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        #e8ead3;
      background-size: 40px 40px;
    }

    /* Strade simulate */
    .street {
      position: absolute;
      background: #fff;
    }
    .street.h { height: 6px; width: 100%; border-radius: 3px; }
    .street.v { width: 6px; height: 100%; border-radius: 3px; }
    .street.h2 { height: 4px; width: 60%; border-radius: 2px; }
    .street.h3 { height: 3px; width: 80%; border-radius: 2px; }
    .street.v2 { width: 4px; height: 70%; border-radius: 2px; }

    /* Pin */
    .pin-wrapper {
      position: absolute;
      top: 38%;
      left: 50%;
      transform: translate(-50%, -100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: bounce 1.2s ease-in-out infinite;
      cursor: pointer;
      z-index: 5;
    }

    @keyframes bounce {
      0%, 100% { transform: translate(-50%, -100%); }
      50% { transform: translate(-50%, -115%); }
    }

    .pin {
      width: 36px;
      height: 36px;
      background: #ea4335;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      box-shadow: 0 4px 12px rgba(234,67,53,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pin::after {
      content: '';
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      transform: rotate(45deg);
    }

    .pin-shadow {
      width: 18px;
      height: 6px;
      background: rgba(0,0,0,0.2);
      border-radius: 50%;
      margin-top: 2px;
      filter: blur(2px);
    }

    /* Pulse ring */
    .pulse {
      position: absolute;
      top: 38%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(234,67,53,0.15);
      animation: pulse 2s ease-out infinite;
    }

    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
    }

    /* Pannello info in basso */
    .info-panel {
      background: #fff;
      border-radius: 16px 16px 0 0;
      padding: 20px 20px 32px;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
      position: relative;
      z-index: 10;
    }

    .drag-handle {
      width: 36px;
      height: 4px;
      background: #dadce0;
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    .shared-label {
      font-size: 11px;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .location-name {
      font-size: 22px;
      font-weight: 600;
      color: #202124;
      margin-bottom: 4px;
    }

    .location-address {
      font-size: 14px;
      color: #5f6368;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .location-address::before {
      content: '📍';
      font-size: 13px;
    }

    /* Bottoni azione */
    .action-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .btn {
      flex: 1;
      padding: 12px 8px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      transition: all 0.15s;
    }

    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: #1a73e8;
      color: #fff;
    }

    .btn-secondary {
      background: #e8f0fe;
      color: #1a73e8;
    }

    .btn-icon {
      font-size: 20px;
    }

    /* ETA */
    .eta-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px;
      background: #f8f9fa;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .eta-row:active { background: #e8eaed; }

    .eta-icon {
      font-size: 24px;
    }

    .eta-text strong {
      display: block;
      font-size: 15px;
      color: #202124;
    }

    .eta-text span {
      font-size: 13px;
      color: #5f6368;
    }

    .eta-arrow {
      margin-left: auto;
      color: #5f6368;
      font-size: 20px;
    }

    /* Overlay scherzo */
    .prank-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    .prank-overlay.show {
      display: flex;
    }

    .prank-msg {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      max-width: 300px;
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .prank-msg .emoji { font-size: 48px; margin-bottom: 12px; }
    .prank-msg h2 { font-size: 20px; color: #202124; margin-bottom: 8px; }
    .prank-msg p { font-size: 14px; color: #5f6368; margin-bottom: 16px; }

    .redirect-btn {
      background: #ea4335;
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <svg width="24" height="24" viewBox="0 0 24 24">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#ea4335"/>
      <circle cx="12" cy="9" r="2.5" fill="#fff"/>
    </svg>
    <div class="search-box">
      <span>Casa nostra 🏠</span>
    </div>
  </div>

  <!-- Mappa fake -->
  <div class="map-container">
    <div class="map-bg"></div>
    <!-- Strade -->
    <div class="street h" style="top: 30%; opacity:0.8;"></div>
    <div class="street h" style="top: 55%; opacity:0.7;"></div>
    <div class="street h" style="top: 72%; opacity:0.6;"></div>
    <div class="street h2" style="top: 42%; left:20%; opacity:0.5;"></div>
    <div class="street v" style="left: 30%; opacity:0.8;"></div>
    <div class="street v" style="left: 65%; opacity:0.7;"></div>
    <div class="street v2" style="left: 48%; top:10%; opacity:0.5;"></div>
    <!-- Isolati simulati -->
    <div style="position:absolute; top:33%; left:32%; width:30%; height:20%; background:rgba(200,210,180,0.6); border-radius:4px;"></div>
    <div style="position:absolute; top:58%; left:15%; width:13%; height:12%; background:rgba(200,210,180,0.5); border-radius:4px;"></div>
    <div style="position:absolute; top:58%; left:68%; width:18%; height:14%; background:rgba(200,210,180,0.5); border-radius:4px;"></div>

    <!-- Pulse + Pin -->
    <div class="pulse"></div>
    <div class="pin-wrapper" onclick="showPrank()">
      <div class="pin"></div>
      <div class="pin-shadow"></div>
    </div>
  </div>

  <!-- Pannello info -->
  <div class="info-panel">
    <div class="drag-handle"></div>
    <div class="shared-label">Posizione condivisa</div>
    <div class="location-name">Casa nostra 🏠</div>
    <div class="location-address">Via del Bosco, 1 – Ecco dove abitiamo!</div>

    <div class="action-buttons">
      <button class="btn btn-primary" onclick="showPrank()">
        <span class="btn-icon">🧭</span>
        Naviga
      </button>
      <button class="btn btn-secondary" onclick="showPrank()">
        <span class="btn-icon">📞</span>
        Chiama
      </button>
      <button class="btn btn-secondary" onclick="showPrank()">
        <span class="btn-icon">⭐</span>
        Salva
      </button>
    </div>

    <div class="eta-row" onclick="showPrank()">
      <div class="eta-icon">🚗</div>
      <div class="eta-text">
        <strong>12 min · 4,2 km</strong>
        <span>Percorso più veloce disponibile</span>
      </div>
      <div class="eta-arrow">›</div>
    </div>
  </div>

  <!-- Overlay scherzo -->
  <div class="prank-overlay" id="prankOverlay">
    <div class="prank-msg">
      <div class="emoji">🌲🏕️🌲</div>
      <h2>Benvenuti a casa nostra!</h2>
      <p>Ecco dove abitiamo davvero… preparatevi al viaggio! 😂</p>
      <button class="redirect-btn" onclick="goToVideo()">Apri indicazioni stradali →</button>
    </div>
  </div>

  <script>
    function showPrank() {
      document.getElementById('prankOverlay').classList.add('show');
    }

    function goToVideo() {
      window.location.href = 'https://www.youtube.com/watch?v=Ipfhyva2Ibc';
    }
  </script>

</body>
</html>
