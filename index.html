<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🫒 Ehi, Ma'</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f5f0e8;color:#2a2010;min-height:100vh}

.info-bar{background:#2d3a1e;color:#a0b080;text-align:center;font-size:12px;padding:10px}
header{background:#2d3a1e;padding:14px 20px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:22px;font-weight:900;color:#c8a84b;letter-spacing:-0.5px}
header p{font-size:11px;color:#a0b080;margin-top:2px}

.cart-btn{position:relative;background:#c8a84b;color:#2d3a1e;border:none;border-radius:16px;padding:10px 18px;font-weight:900;font-size:18px;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 3px 12px rgba(200,168,75,.5)}
.cart-badge{position:absolute;top:-8px;right:-8px;background:#e63946;color:#fff;border-radius:50%;width:26px;height:26px;display:none;align-items:center;justify-content:center;font-size:13px;font-weight:900;border:2px solid #2d3a1e}
.cart-badge.visible{display:flex}

.cat-nav{background:#fff;border-bottom:2px solid #e0d8c8;position:sticky;top:57px;z-index:90}
.cat-tabs{display:flex;overflow-x:auto;padding:0}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex-shrink:0;padding:13px 18px;border:none;background:none;color:#8b7a5a;font-weight:700;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.cat-tab.active{color:#2d3a1e;border-bottom-color:#c8a84b}

.page{display:none;padding:16px;max-width:600px;margin:0 auto}
.page.active{display:block}
.page-title{font-size:20px;font-weight:900;color:#2d3a1e;margin-bottom:4px}
.page-sub{font-size:12px;color:#8b7a5a;margin-bottom:16px}

.item{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.item-info{flex:1;padding-right:12px}
.item-name{font-size:14px;font-weight:700;color:#2a2010}
.item-desc{font-size:11px;color:#8b7a5a;margin-top:2px;line-height:1.4}
.item-price{font-size:15px;font-weight:800;color:#c8a84b;flex-shrink:0;margin-right:10px}
.qty-ctrl{display:flex;align-items:center;gap:8px;flex-shrink:0}
.qty-btn{width:30px;height:30px;border-radius:50%;border:none;background:#2d3a1e;color:#c8a84b;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-num{font-size:15px;font-weight:800;min-width:18px;text-align:center}

.loading{text-align:center;padding:60px 20px;color:#8b7a5a}
.spinner{font-size:36px;animation:spin 1s linear infinite;display:inline-block;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#fee;border:1px solid #fcc;border-radius:12px;padding:16px;margin:20px;color:#c00;font-size:14px;line-height:1.6}

/* MODAL BASE */
.modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55)}
.modal.open{display:flex;align-items:flex-end}
.sheet{background:#fff;border-radius:22px 22px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:22px}
.sheet-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.sheet-header h2{font-size:20px;font-weight:900;color:#2d3a1e}
.close-btn{background:#f0e8d8;border:none;border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;color:#6b5a3a;display:flex;align-items:center;justify-content:center}

/* CART */
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0e8d8}
.ci-name{font-size:14px;color:#2a2010;font-weight:600}
.ci-qty{font-size:12px;color:#8b7a5a;margin-top:2px}
.ci-tot{font-weight:800;color:#c8a84b;font-size:14px}
.cart-total-row{display:flex;justify-content:space-between;padding:16px 0 0;font-size:17px;font-weight:900}
.cart-total-row span:last-child{color:#c8a84b;font-size:20px}
.empty-cart{text-align:center;padding:30px;color:#8b7a5a;font-size:14px}

.field{margin:14px 0 0}
.field label{font-size:13px;font-weight:700;color:#2d3a1e;display:block;margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;padding:11px 14px;border:2px solid #e0d8c8;border-radius:12px;font-size:14px;outline:none;font-family:inherit;background:#faf8f4;color:#2a2010;appearance:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:#c8a84b}
.field textarea{resize:none;height:70px}

.pay-btn{width:100%;margin-top:18px;padding:15px;background:#2d3a1e;color:#c8a84b;border:none;border-radius:14px;font-size:16px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 14px rgba(45,58,30,.3)}
.pay-btn:active{opacity:.85}

/* PAYMENT MODAL */
.pay-methods{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.pay-method{padding:14px;border:2px solid #e0d8c8;border-radius:14px;background:#fff;cursor:pointer;text-align:center;transition:all .2s}
.pay-method:hover,.pay-method.selected{border-color:#c8a84b;background:#fffbf0}
.pay-method .pm-icon{font-size:28px;margin-bottom:6px}
.pay-method .pm-name{font-size:13px;font-weight:700;color:#2d3a1e}
.pay-method .pm-sub{font-size:11px;color:#8b7a5a;margin-top:2px}

.card-form{background:#f5f0e8;border-radius:14px;padding:16px;margin-bottom:14px}
.card-form .cf-title{font-size:12px;font-weight:700;color:#8b7a5a;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.card-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cf-input{width:100%;padding:10px 12px;border:2px solid #e0d8c8;border-radius:10px;font-size:14px;font-family:inherit;background:#fff;outline:none}
.cf-input:focus{border-color:#c8a84b}
.cf-input.full{grid-column:1/-1}

.test-cards{background:#e8f4e8;border-radius:10px;padding:12px;margin-bottom:14px;font-size:12px;color:#2d5a2d;line-height:1.8}
.test-cards strong{display:block;margin-bottom:4px;font-size:13px}

.pay-total{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:1px solid #e0d8c8;border-bottom:1px solid #e0d8c8;margin-bottom:14px}
.pay-total span:first-child{font-size:14px;color:#8b7a5a}
.pay-total span:last-child{font-size:22px;font-weight:900;color:#2d3a1e}

.confirm-pay-btn{width:100%;padding:15px;background:#c8a84b;color:#2d3a1e;border:none;border-radius:14px;font-size:16px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.confirm-pay-btn:disabled{opacity:.5;cursor:default}

/* PROCESSING */
.processing{text-align:center;padding:30px 20px}
.proc-spinner{font-size:48px;animation:spin 1s linear infinite;display:inline-block;margin-bottom:16px}
.proc-title{font-size:18px;font-weight:800;color:#2d3a1e;margin-bottom:8px}
.proc-sub{font-size:13px;color:#8b7a5a}

/* SUCCESS */
.success-screen{text-align:center;padding:20px}
.success-icon{font-size:64px;margin-bottom:16px}
.success-title{font-size:22px;font-weight:900;color:#2d3a1e;margin-bottom:8px}
.success-sub{font-size:14px;color:#8b7a5a;line-height:1.6;margin-bottom:20px}
.success-detail{background:#f5f0e8;border-radius:14px;padding:16px;text-align:left;margin-bottom:20px;font-size:13px;line-height:1.8;color:#2a2010}
.wa-btn{width:100%;padding:15px;background:#25D366;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}

.sim-badge{display:inline-block;background:#f59e0b22;color:#b45309;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;margin-left:8px;vertical-align:middle}
</style>
</head>
<body>

<div class="info-bar">🕐 Colazione 7:30–10:00 &nbsp;|&nbsp; Pranzo 12:00–14:00 &nbsp;|&nbsp; Cena 18:30–22:30</div>

<header>
  <div>
    <h1>Ehi, Ma'</h1>
    <p>Area Sosta Camper – Alberobello</p>
  </div>
  <button class="cart-btn" onclick="openCart()">
    🛒 <span style="font-size:14px;font-weight:900" id="cart-label">Carrello</span>
    <span class="cart-badge" id="cart-badge">0</span>
  </button>
</header>

<div class="cat-nav"><div class="cat-tabs" id="cat-tabs"></div></div>
<div id="pages"><div class="page active"><div class="loading"><div class="spinner">⏳</div><br>Caricamento menù...</div></div></div>

<!-- CART MODAL -->
<div class="modal" id="cart-modal" onclick="closeOutside(event,'cart-modal')">
  <div class="sheet">
    <div class="sheet-header"><h2>🛒 Il tuo ordine</h2><button class="close-btn" onclick="closeModal('cart-modal')">✕</button></div>
    <div id="cart-items"></div>
    <div class="field"><label>📍 Numero piazzola / targa camper</label><input id="camper-num" type="text" placeholder="Es. Piazzola 12 o AB123CD"></div>
    <div class="field"><label>🕐 Quando vuoi ricevere l'ordine?</label>
      <select id="slot-field">
        <option value="">— Seleziona orario —</option>
        <optgroup label="☕ Colazione (domani mattina)">
          <option>Domani 07:30</option><option>Domani 08:00</option>
          <option>Domani 08:30</option><option>Domani 09:00</option><option>Domani 09:30</option>
        </optgroup>
        <optgroup label="🥗 Pranzo (oggi)">
          <option>Oggi 12:00</option><option>Oggi 12:30</option>
          <option>Oggi 13:00</option><option>Oggi 13:30</option>
        </optgroup>
        <optgroup label="🍷 Cena (stasera)">
          <option>Stasera 18:30</option><option>Stasera 19:00</option><option>Stasera 19:30</option>
          <option>Stasera 20:00</option><option>Stasera 20:30</option><option>Stasera 21:00</option><option>Stasera 21:30</option>
        </optgroup>
      </select>
    </div>
    <div class="field"><label>📝 Note (allergie, preferenze…)</label><textarea id="note-field" placeholder="Es. senza glutine, ben cotto…"></textarea></div>
    <button class="pay-btn" onclick="goToPayment()">💳 Procedi al pagamento</button>
  </div>
</div>

<!-- PAYMENT MODAL -->
<div class="modal" id="pay-modal" onclick="closeOutside(event,'pay-modal')">
  <div class="sheet" id="pay-sheet">
    <!-- contenuto dinamico -->
  </div>
</div>

<script>
const SUPABASE_URL = "https://xieetkuzpfumchhpgmen.supabase.co";
const SUPABASE_KEY = "sb_publishable_Yk8kzYtGy-TCVk8vX1vOTg_6_7U0rZU";
const WA_NUMBER    = "393406707398";

let menuData = [], cart = {}, selMethod = null, orderData = null;
const fmt = n => "€" + n.toFixed(2).replace(".", ",");
const cartTotal = () => {
  const all = menuData.flatMap(c => c.items);
  return Object.entries(cart).reduce((s,[id,q]) => s + (all.find(x=>x.id==id)?.price||0)*q, 0);
};

async function loadMenu() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/menu_items?select=*&order=categoria.asc,sort_order.asc`,
      {headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}});
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const rows = await res.json();
    const map = {};
    rows.forEach(r => { if(!map[r.categoria]) map[r.categoria]=[]; map[r.categoria].push(r); });
    menuData = Object.entries(map).map(([cat,items])=>({cat,items}));
    buildUI();
  } catch(e) {
    document.getElementById('pages').innerHTML =
      `<div class="error-box">⚠️ Impossibile caricare il menù.<br><small>${e.message}</small></div>`;
  }
}

function buildUI() {
  const tabs = document.getElementById('cat-tabs');
  const pages = document.getElementById('pages');
  tabs.innerHTML = ''; pages.innerHTML = '';
  menuData.forEach((c,i) => {
    const tab = document.createElement('button');
    tab.className = 'cat-tab'+(i===0?' active':'');
    tab.textContent = c.cat;
    tab.onclick = () => switchPage(i);
    tabs.appendChild(tab);
    const page = document.createElement('div');
    page.className = 'page'+(i===0?' active':'');
    page.id = 'page-'+i;
    const [emoji,...rest] = c.cat.split(' ');
    page.innerHTML = `<div class="page-title">${emoji} ${rest.join(' ')}</div>
      <div class="page-sub">${c.items.filter(x=>x.available).length} voci disponibili</div>`;
    c.items.filter(x=>x.available).forEach(item => {
      const d = document.createElement('div');
      d.className = 'item';
      d.innerHTML = `<div class="item-info">
          <div class="item-name">${item.name}</div>
          ${item.description?`<div class="item-desc">${item.description}</div>`:''}
        </div>
        <div class="item-price">${fmt(item.price)}</div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="chg(${item.id},-1)">−</button>
          <span class="qty-num" id="q${item.id}">0</span>
          <button class="qty-btn" onclick="chg(${item.id},1)">+</button>
        </div>`;
      page.appendChild(d);
    });
    pages.appendChild(page);
  });
}

function switchPage(i) {
  document.querySelectorAll('.cat-tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.querySelectorAll('.page').forEach((p,j)=>p.classList.toggle('active',j===i));
  window.scrollTo({top:0,behavior:'smooth'});
}

function chg(id, delta) {
  cart[id] = Math.max(0,(cart[id]||0)+delta);
  if (!cart[id]) delete cart[id];
  const el = document.getElementById('q'+id);
  if (el) el.textContent = cart[id]||0;
  const tot = Object.values(cart).reduce((a,b)=>a+b,0);
  const badge = document.getElementById('cart-badge');
  badge.textContent = tot;
  badge.classList.toggle('visible', tot>0);
  document.getElementById('cart-label').textContent = tot>0?`(${tot})`:'Carrello';
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeOutside(e,id) { if(e.target===document.getElementById(id)) closeModal(id); }

function openCart() {
  const all = menuData.flatMap(c=>c.items);
  const ids = Object.keys(cart);
  const el = document.getElementById('cart-items');
  if (!ids.length) { el.innerHTML='<div class="empty-cart">🛒 Carrello vuoto</div>'; openModal('cart-modal'); return; }
  let html='', total=0;
  ids.forEach(id => {
    const item = all.find(x=>x.id==id), qty=cart[id], sub=item.price*qty;
    total+=sub;
    html+=`<div class="cart-item"><div><div class="ci-name">${item.name}</div><div class="ci-qty">x${qty} × ${fmt(item.price)}</div></div><div class="ci-tot">${fmt(sub)}</div></div>`;
  });
  html+=`<div class="cart-total-row"><span>Totale</span><span>${fmt(total)}</span></div>`;
  el.innerHTML=html;
  openModal('cart-modal');
}

function goToPayment() {
  const slot = document.getElementById('slot-field').value;
  const camper = document.getElementById('camper-num').value.trim();
  if (!Object.keys(cart).length) { alert('Aggiungi almeno un prodotto!'); return; }
  if (!slot) { alert('Seleziona un orario!'); return; }
  orderData = { slot, camper, note: document.getElementById('note-field').value.trim() };
  closeModal('cart-modal');
  showPaymentSheet();
  openModal('pay-modal');
}

function showPaymentSheet() {
  selMethod = null;
  const total = cartTotal();
  document.getElementById('pay-sheet').innerHTML = `
    <div class="sheet-header"><h2>💳 Pagamento <span class="sim-badge">SIMULAZIONE</span></h2><button class="close-btn" onclick="closeModal('pay-modal')">✕</button></div>
    <div class="test-cards"><strong>🧪 Carte di test:</strong>
      ✅ Successo: <strong>4242 4242 4242 4242</strong><br>
      ❌ Rifiutata: <strong>4000 0000 0000 0002</strong><br>
      Scadenza: qualsiasi data futura &nbsp;|&nbsp; CVV: qualsiasi 3 cifre
    </div>
    <div class="pay-methods">
      <div class="pay-method" onclick="selPayMethod('card',this)"><div class="pm-icon">💳</div><div class="pm-name">Carta</div><div class="pm-sub">Credito / Debito</div></div>
      <div class="pay-method" onclick="selPayMethod('apple',this)"><div class="pm-icon"></div><div class="pm-name">Apple Pay</div><div class="pm-sub">Touch / Face ID</div></div>
      <div class="pay-method" onclick="selPayMethod('google',this)"><div class="pm-icon">G</div><div class="pm-name">Google Pay</div><div class="pm-sub">Android</div></div>
      <div class="pay-method" onclick="selPayMethod('cash',this)"><div class="pm-icon">💵</div><div class="pm-name">Contanti</div><div class="pm-sub">Alla consegna</div></div>
    </div>
    <div id="card-form-area"></div>
    <div class="pay-total"><span>Totale ordine</span><span>${fmt(total)}</span></div>
    <button class="confirm-pay-btn" id="confirm-btn" onclick="processPayment()" disabled>Seleziona metodo</button>`;
}

function selPayMethod(method, el) {
  selMethod = method;
  document.querySelectorAll('.pay-method').forEach(x=>x.classList.remove('selected'));
  el.classList.add('selected');
  const area = document.getElementById('card-form-area');
  const btn = document.getElementById('confirm-btn');
  if (method === 'card') {
    area.innerHTML = `<div class="card-form">
      <div class="cf-title">Dati carta</div>
      <div style="display:grid;gap:10px">
        <input class="cf-input full" id="cf-num" placeholder="1234 5678 9012 3456" maxlength="19" oninput="fmtCard(this)">
        <div class="card-row">
          <input class="cf-input" id="cf-exp" placeholder="MM/AA" maxlength="5" oninput="fmtExp(this)">
          <input class="cf-input" id="cf-cvv" placeholder="CVV" maxlength="3" type="password">
        </div>
        <input class="cf-input full" id="cf-name" placeholder="Nome sul titolare">
      </div></div>`;
    btn.disabled = false;
    btn.textContent = '🔒 Paga ' + fmt(cartTotal());
  } else if (method === 'apple') {
    area.innerHTML = '';
    btn.disabled = false;
    btn.innerHTML = ' Paga con Apple Pay';
  } else if (method === 'google') {
    area.innerHTML = '';
    btn.disabled = false;
    btn.innerHTML = '<span style="font-weight:900;font-size:18px">G</span> Paga con Google Pay';
  } else if (method === 'cash') {
    area.innerHTML = `<div style="background:#f5f0e8;border-radius:12px;padding:14px;margin-bottom:14px;font-size:13px;color:#6b5a3a;line-height:1.6">💵 Pagherai in contanti al momento della consegna.<br>Tieni pronti <strong>${fmt(cartTotal())}</strong>.</div>`;
    btn.disabled = false;
    btn.textContent = '✅ Conferma ordine';
  }
}

function fmtCard(el) {
  let v = el.value.replace(/\D/g,'').substring(0,16);
  el.value = v.replace(/(.{4})/g,'$1 ').trim();
}
function fmtExp(el) {
  let v = el.value.replace(/\D/g,'');
  if (v.length>=2) v = v.substring(0,2)+'/'+v.substring(2);
  el.value = v;
}

function processPayment() {
  if (selMethod === 'card') {
    const num = (document.getElementById('cf-num')?.value||'').replace(/\s/g,'');
    if (num.length < 16) { alert('Inserisci un numero di carta valido (16 cifre)'); return; }
    const exp = document.getElementById('cf-exp')?.value||'';
    if (exp.length < 5) { alert('Inserisci una data di scadenza valida'); return; }
    const cvv = document.getElementById('cf-cvv')?.value||'';
    if (cvv.length < 3) { alert('Inserisci il CVV'); return; }
    // Simula carta rifiutata
    if (num === '4000000000000002') { showDeclined(); return; }
  }
  showProcessing();
}

function showProcessing() {
  document.getElementById('pay-sheet').innerHTML = `
    <div class="processing">
      <div class="proc-spinner">⏳</div>
      <div class="proc-title">Pagamento in corso…</div>
      <div class="proc-sub">Non chiudere questa pagina</div>
    </div>`;
  setTimeout(showSuccess, 2200);
}

function showDeclined() {
  document.getElementById('pay-sheet').innerHTML = `
    <div class="processing">
      <div style="font-size:48px;margin-bottom:16px">❌</div>
      <div class="proc-title" style="color:#dc2626">Carta rifiutata</div>
      <div class="proc-sub" style="margin-bottom:20px">Il pagamento non è andato a buon fine.<br>Prova con un'altra carta.</div>
      <button class="confirm-pay-btn" onclick="showPaymentSheet();openModal('pay-modal')" style="background:#2d3a1e;color:#c8a84b">← Riprova</button>
    </div>`;
}

function showSuccess() {
  const all = menuData.flatMap(c=>c.items);
  const ids = Object.keys(cart);
  let lines='', total=0;
  ids.forEach(id=>{
    const item=all.find(x=>x.id==id),qty=cart[id],sub=item.price*qty;
    total+=sub;
    lines+=`• ${item.name} x${qty} — ${fmt(sub)}\n`;
  });
  const methodLabel = {card:'💳 Carta',apple:' Apple Pay',google:'G Google Pay',cash:'💵 Contanti'}[selMethod]||'';
  document.getElementById('pay-sheet').innerHTML = `
    <div class="success-screen">
      <div class="success-icon">✅</div>
      <div class="success-title">Pagamento confermato!</div>
      <div class="success-sub">Il tuo ordine è stato ricevuto.<br>Tocca il pulsante per avvisarci su WhatsApp.</div>
      <div class="success-detail">
        📍 <strong>Piazzola:</strong> ${orderData.camper||'—'}<br>
        🕐 <strong>Orario:</strong> ${orderData.slot}<br>
        💳 <strong>Pagamento:</strong> ${methodLabel}<br><br>
        <strong>Ordine:</strong><br>${lines.trim()}<br><br>
        💶 <strong>Totale:</strong> ${fmt(total)}
      </div>
      <button class="wa-btn" onclick="sendWA('${methodLabel}','${fmt(total)}')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Invia ordine su WhatsApp
      </button>
    </div>`;
  cart = {};
  document.getElementById('cart-badge').classList.remove('visible');
  document.getElementById('cart-label').textContent = 'Carrello';
  menuData.flatMap(c=>c.items).forEach(item=>{
    const el=document.getElementById('q'+item.id);
    if(el) el.textContent='0';
  });
}

function sendWA(method, totalStr) {
  const all = menuData.flatMap(c=>c.items);
  let msg = `🫒 *Nuovo ordine – Ehi, Ma'*\n\n`;
  if (orderData.camper) msg += `📍 *Piazzola/Camper:* ${orderData.camper}\n`;
  msg += `🕐 *Orario:* ${orderData.slot}\n`;
  msg += `💳 *Pagamento:* ${method} ✅ CONFERMATO\n\n*Ordine:*\n`;
  Object.entries(cart).forEach(([id,qty])=>{
    const item=all.find(x=>x.id==id);
    if(item) msg+=`• ${item.name} x${qty} → ${fmt(item.price*qty)}\n`;
  });
  msg += `\n💶 *Totale: ${totalStr}*`;
  if (orderData.note) msg += `\n\n📝 *Note:* ${orderData.note}`;
  window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`,'_blank');
  closeModal('pay-modal');
}

loadMenu();
</script>
</body>
