  const slotField = document.getElementById('slot-field');
  const groups = slotField.querySelectorAll('optgroup');
  [t('slotCol'), t('slotPra'), t('slotCen')].forEach((slots, gi) => {

    slots.forEach((s, i) => { if(opts[i]) opts[i].textContent = s; });
  });

      'Sorbetto al limone': 'https://images.unsplash.com/photo-1488900128323-21503983a07e?w=600&q=80',
    };
    rows.forEach(r => { 
      if(!r.image_url) r.image_url = placeholders[r.name] || null; 
    });
    const map = {};
    rows.forEach(r => { if(!map[r.categoria]) map[r.categoria]=[]; map[r.categoria].push(r); });
    menuData = Object.entries(map).map(([cat,items])=>({cat,items}));
    buildUI();
  } catch(e) {
    document.getElementById('pages').innerHTML =
      `<div class="error-box">⚠️ ${lang==='it'?'Impossibile caricare il menù':'Unable to load the menu'}.<br><small>${e.message}</small></div>`;
  }
}

function buildUI() {
  const tabs = document.getElementById('cat-tabs');
  const pages = document.getElementById('pages');
  tabs.innerHTML = ''; pages.innerHTML = '';
  menuData.forEach((c, i) => {
    const tab = document.createElement('button');
    tab.className = 'cat-tab'+(i===0?' active':'');
    tab.textContent = c.cat;
    tab.onclick = () => switchPage(i);
    tabs.appendChild(tab);
    const page = document.createElement('div');
    page.className = 'page'+(i===0?' active':'');
    page.id = 'page-'+i;
    const [emoji,...rest] = c.cat.split(' ');
    const avail = c.items.filter(x=>x.available).length;
    page.innerHTML = `<div class="page-title">${emoji} ${rest.join(' ')}</div>
      <div class="page-sub">${avail} ${t('availLabel')}</div>`;
    c.items.filter(x=>x.available).forEach(item => {
      const d = document.createElement('div');
      d.className = 'item';
      const desc = lang === 'en' && item.description_en ? item.description_en : item.description;
      const name = lang === 'en' && item.name_en ? item.name_en : item.name;
      if (item.image_url) {
        // Card con immagine grande sopra
        d.style.cssText = 'flex-direction:column;align-items:stretch;padding:0;overflow:hidden';
        d.innerHTML = `
          <div style="width:100%;height:180px;overflow:hidden;border-radius:14px 14px 0 0;background:#e8e0d0">
            <img src="${item.image_url}" alt="${name}" 
              style="width:100%;height:100%;object-fit:cover;display:block"
              onerror="this.parentElement.style.display='none'">
          </div>
          <div style="padding:14px 16px;display:flex;justify-content:space-between;align-items:center">
            <div class="item-info">
              <div class="item-name">${name}</div>
              ${desc?`<div class="item-desc">${desc}</div>`:''}
            </div>
            <div class="item-price">${fmt(item.price)}</div>
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="chg(${item.id},-1)">−</button>
              <span class="qty-num" id="q${item.id}">${cart[item.id]||0}</span>
              <button class="qty-btn" onclick="chg(${item.id},1)">+</button>
            </div>
          </div>`;
      } else {
        // Card standard senza immagine
        d.innerHTML = `<div class="item-info">
            <div class="item-name">${name}</div>
            ${desc?`<div class="item-desc">${desc}</div>`:''}
          </div>
          <div class="item-price">${fmt(item.price)}</div>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="chg(${item.id},-1)">−</button>
            <span class="qty-num" id="q${item.id}">${cart[item.id]||0}</span>
            <button class="qty-btn" onclick="chg(${item.id},1)">+</button>
          </div>`;
      }
      page.appendChild(d);
    });
    pages.appendChild(page);
  });
}

function switchPage(i) {
  document.querySelectorAll('.cat-tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.querySelectorAll('.page').forEach((p,j)=>p.classList.toggle('active',j===i));
  window.scrollTo({top:0,behavior:'smooth'});
}

function chg(id, delta) {
  cart[id] = Math.max(0,(cart[id]||0)+delta);
  if (!cart[id]) delete cart[id];
  const el = document.getElementById('q'+id);
  if (el) el.textContent = cart[id]||0;
  const tot = Object.values(cart).reduce((a,b)=>a+b,0);
  const badge = document.getElementById('cart-badge');
  badge.textContent = tot;
  badge.classList.toggle('visible', tot>0);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeOutside(e,id) { if(e.target===document.getElementById(id)) closeModal(id); }

function openCart() {
  const all = menuData.flatMap(c=>c.items);
  const ids = Object.keys(cart);
  const el = document.getElementById('cart-items');
  if (!ids.length) { el.innerHTML=`<div class="empty-cart">${t('emptyCart')}</div>`; openModal('cart-modal'); return; }
  let html='', total=0;
  ids.forEach(id => {
    const item=all.find(x=>x.id==id), qty=cart[id], sub=item.price*qty;
    total+=sub;
    const name = lang==='en'&&item.name_en?item.name_en:item.name;
    html+=`<div class="cart-item"><div><div class="ci-name">${name}</div><div class="ci-qty">x${qty} × ${fmt(item.price)}</div></div><div class="ci-tot">${fmt(sub)}</div></div>`;
  });
  html+=`<div class="cart-total-row"><span>${t('totalLabel')}</span><span>${fmt(total)}</span></div>`;
  el.innerHTML=html;
  openModal('cart-modal');
}

function goToPayment() {
  const email = document.getElementById('email-field').value.trim();
  const slot = document.getElementById('slot-field').value;
  const camper = document.getElementById('camper-num').value.trim();
  if (!Object.keys(cart).length) { alert(t('alertProduct')); return; }
  if (!email||!email.includes('@')) { alert(t('alertEmail')); return; }
  if (!slot) { alert(t('alertSlot')); return; }
  orderData = {email, slot, camper, note: document.getElementById('note-field').value.trim()};
  closeModal('cart-modal');
  showPaymentSheet();
  openModal('pay-modal');
}

function showPaymentSheet() {
  selMethod = null;
  const total = cartTotal();
  document.getElementById('pay-sheet').innerHTML = `
    <div class="sheet-header"><h2>${t('payTitle')} <span class="sim-badge">SIMULAZIONE</span></h2><button class="close-btn" onclick="closeModal('pay-modal')">✕</button></div>
    <div class="test-cards"><strong>${t('testCardsTitle')}</strong><br>
      ${t('testCardsOk')} <strong>4242 4242 4242 4242</strong><br>
      ${t('testCardsKo')} <strong>4000 0000 0000 0002</strong><br>
      ${t('testCardsHint')}
    </div>
    <div class="pay-methods">
      <div class="pay-method" onclick="selPayMethod('card',this)"><div class="pm-icon">💳</div><div class="pm-name">${t('methods').card}</div><div class="pm-sub">${t('methodsSub').card}</div></div>
      <div class="pay-method" onclick="selPayMethod('apple',this)"><div class="pm-icon"></div><div class="pm-name">${t('methods').apple}</div><div class="pm-sub">${t('methodsSub').apple}</div></div>
      <div class="pay-method" onclick="selPayMethod('google',this)"><div class="pm-icon" style="font-weight:900;font-size:22px;color:#4285F4">G</div><div class="pm-name">${t('methods').google}</div><div class="pm-sub">${t('methodsSub').google}</div></div>
      <div class="pay-method" onclick="selPayMethod('cash',this)"><div class="pm-icon">💵</div><div class="pm-name">${t('methods').cash}</div><div class="pm-sub">${t('methodsSub').cash}</div></div>
    </div>
    <div id="card-form-area"></div>
    <div class="pay-total"><span>${t('totalLabel')}</span><span>${fmt(total)}</span></div>
    <button class="confirm-pay-btn" id="confirm-btn" onclick="processPayment()" disabled>${t('btnConfirmSel')}</button>`;
}

function selPayMethod(method, el) {
  selMethod = method;
  document.querySelectorAll('.pay-method').forEach(x=>x.classList.remove('selected'));
  el.classList.add('selected');
  const area = document.getElementById('card-form-area');
  const btn = document.getElementById('confirm-btn');
  const tr = T[lang];
  if (method==='card') {
    area.innerHTML = `<div class="card-form">
      <div class="cf-title">${tr.cardFormTitle}</div>
      <div style="display:grid;gap:10px">
        <input class="cf-input" id="cf-num" placeholder="${tr.cfNum}" maxlength="19" oninput="fmtCard(this)">
        <div class="card-row">
          <input class="cf-input" id="cf-exp" placeholder="${tr.cfExp}" maxlength="5" oninput="fmtExp(this)">
          <input class="cf-input" id="cf-cvv" placeholder="${tr.cfCvv}" maxlength="3" type="password">
        </div>
        <input class="cf-input" id="cf-name" placeholder="${tr.cfName}">
      </div></div>`;
    btn.disabled=false; btn.textContent=tr.btnConfirm+fmt(cartTotal());
  } else if (method==='apple') {
    area.innerHTML=''; btn.disabled=false; btn.innerHTML=` ${tr.methods.apple}`;
  } else if (method==='google') {
    area.innerHTML=''; btn.disabled=false; btn.innerHTML=`<span style="font-weight:900;font-size:18px;color:#fff">G</span> ${tr.methods.google}`;
  } else if (method==='cash') {
    area.innerHTML=`<div style="background:#f5f0e8;border-radius:12px;padding:14px;margin-bottom:14px;font-size:13px;color:#6b5a3a;line-height:1.6">💵 ${tr.cashNote}<strong>${fmt(cartTotal())}</strong>.</div>`;
    btn.disabled=false; btn.textContent=`✅ ${lang==='it'?'Conferma ordine':'Confirm order'}`;
  }
}

function fmtCard(el){let v=el.value.replace(/\D/g,'').substring(0,16);el.value=v.replace(/(.{4})/g,'$1 ').trim();}
function fmtExp(el){let v=el.value.replace(/\D/g,'');if(v.length>=2)v=v.substring(0,2)+'/'+(lang==='en'?v.substring(2):v.substring(2));el.value=v;}

function processPayment() {
  if (selMethod==='card') {
    const num=(document.getElementById('cf-num')?.value||'').replace(/\s/g,'');
    if(num.length<16){alert(t('alertCard'));return;}
    const exp=document.getElementById('cf-exp')?.value||'';
    if(exp.length<5){alert(t('alertExp'));return;}
    const cvv=document.getElementById('cf-cvv')?.value||'';
    if(cvv.length<3){alert(t('alertCvv'));return;}
    if(num==='4000000000000002'){showDeclined();return;}
  }
  showProcessing();
}

function showProcessing() {
  const tr = T[lang];
  document.getElementById('pay-sheet').innerHTML=`<div class="processing"><div class="proc-spinner">⏳</div><div class="proc-title">${tr.procPay}</div><div class="proc-sub">${tr.procPaySub}</div></div>`;
  delay(2000).then(()=>{
    document.getElementById('pay-sheet').innerHTML=`<div class="processing"><div class="proc-spinner">💾</div><div class="proc-title">${tr.procSave}</div><div class="proc-sub">${tr.procSaveSub}</div></div>`;
    return delay(1200);
  }).then(()=>{
    document.getElementById('pay-sheet').innerHTML=`<div class="processing"><div class="proc-spinner">📧</div><div class="proc-title">${tr.procEmail}</div><div class="proc-sub">${orderData.email}</div></div>`;
    return delay(1200);
  }).then(()=>showSuccess());
}

function showDeclined() {
  const tr = T[lang];
  document.getElementById('pay-sheet').innerHTML=`<div class="processing">
    <div style="font-size:48px;margin-bottom:16px">❌</div>
    <div class="proc-title" style="color:#dc2626">${tr.declinedTitle}</div>
    <div class="proc-sub" style="margin-bottom:20px">${tr.declinedSub}</div>
    <button class="confirm-pay-btn" onclick="showPaymentSheet()" style="background:#2d3a1e;color:#c8a84b">${tr.retryBtn}</button>
  </div>`;
}

function showSuccess() {
  const tr = T[lang];
  const all = menuData.flatMap(c=>c.items);
  let lines='', total=0;
  Object.entries(cart).forEach(([id,qty])=>{
    const item=all.find(x=>x.id==id);
    if(!item) return;
    const name=lang==='en'&&item.name_en?item.name_en:item.name;
    const sub=item.price*qty; total+=sub;
    lines+=`• ${name} x${qty} — ${fmt(sub)}\n`;
  });
  const methodLabel = tr.methods[selMethod]||'';
  document.getElementById('pay-sheet').innerHTML=`
    <div class="success-screen">
      <div class="success-icon">✅</div>
      <div class="success-title">${tr.successTitle}</div>
      <div class="success-sub">${tr.successSub} <strong>${orderData.email}</strong></div>
      <div class="success-detail">
        📍 <strong>${tr.detailPiazzola}:</strong> ${orderData.camper||'—'}<br>
        🕐 <strong>${tr.detailOrario}:</strong> ${orderData.slot}<br>
        💳 <strong>${tr.detailPagamento}:</strong> ${methodLabel} ✅<br>
        📧 <strong>${tr.detailEmail}:</strong> ${orderData.email}<br><br>
        <strong>${tr.detailOrdine}:</strong><br>${lines.trim()}<br><br>
        💶 <strong>${tr.totalLabel}:</strong> ${fmt(total)}
      </div>
      <div class="sim-note">${tr.simNote1}<br>📧 Email → ${orderData.email} [${lang==='it'?'SIMULAZIONE':'SIMULATION'}]</div>
      <button class="wa-btn" onclick="sendWA('${methodLabel}','${fmt(total)}')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        ${tr.waBtn}
      </button>
    </div>`;
  cart={};
  document.getElementById('cart-badge').classList.remove('visible');
  menuData.flatMap(c=>c.items).forEach(item=>{const el=document.getElementById('q'+item.id);if(el)el.textContent='0';});
}

function sendWA(method, totalStr) {
  const tr = T[lang];
  const all = menuData.flatMap(c=>c.items);
  let msg=`${tr.waMsg}\n\n`;
  if(orderData.camper) msg+=`${tr.waPiazzola} ${orderData.camper}\n`;
  msg+=`${tr.waOrario} ${orderData.slot}\n${tr.waPagamento} ${method} ✅\n\n${tr.waOrdine}\n`;
  Object.entries(cart).forEach(([id,qty])=>{
    const item=all.find(x=>x.id==id);
    if(item){const name=lang==='en'&&item.name_en?item.name_en:item.name;msg+=`• ${name} x${qty} → ${fmt(item.price*qty)}\n`;}
  });
  msg+=`\n${tr.waTotale} ${totalStr}`;
  if(orderData.note) msg+=`\n\n${tr.waNote} ${orderData.note}`;
  window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`,'_blank');
  closeModal('pay-modal');
}

loadMenu();
</script>
